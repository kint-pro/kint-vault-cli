version: 2

builds:
  - main: ./cmd/kint-vault/
    binary: kint-vault
    ldflags:
      - -s -w -X main.version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

release:
  github:
    owner: kint-pro
    name: kint-vault-cli

brews:
  - repository:
      owner: kint-pro
      name: homebrew-tap
    name: kint-vault
    description: "Secrets management CLI — encrypt .env files directly in your repo"
    license: "Apache-2.0"
    homepage: "https://github.com/kint-pro/kint-vault-cli"
    install: |
      bin.install "kint-vault"
    test: |
      assert_match version.to_s, shell_output("#{bin}/kint-vault --version", 0)
